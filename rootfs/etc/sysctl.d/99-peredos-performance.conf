# ПередОС — оптимизации производительности ядра
# ПередСкорость™ Technology

# === Управление памятью ===

# Агрессивная очистка кэша при нехватке памяти
vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.dirty_expire_centisecs = 1000
vm.dirty_writeback_centisecs = 500

# Огромные страницы для приложений
vm.nr_hugepages = 8
vm.hugetlb_shm_group = 1001

# === Сеть ===

# Увеличение буферов сети
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.core.netdev_max_backlog = 65536
net.ipv4.tcp_congestion_control = bbr

# === Файловая система ===

# Увеличение лимитов открытых файлов
fs.file-max = 2097152
fs.inotify.max_user_watches = 524288

# === Ядро ===

# Планировщик процессов — оптимизация для интерактивности
kernel.sched_latency_ns = 1000000
kernel.sched_min_granularity_ns = 100000
kernel.sched_wakeup_granularity_ns = 50000

# === Безопасность ===

# Защита от ICMP атак
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Защита от IP спуфинга
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Отключение source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Отключение ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
